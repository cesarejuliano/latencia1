    <main class="conteudo-ninfas">
      <div class="audio-container">
        <button id="playButton">▶️</button>
        <audio id="audio" src="audios/ninfas.mp3"></audio>
      </div>
      <div class="scroll-layer">

        <section class="bloco delay" id="bloco-1">
          <video autoplay muted loop playsinline>
            <source src="videos/anneteresa.mp4" type="video/mp4">
          </video>
        </section>
        <section class="bloco" id="bloco-2">
          <p style="color: white; font-size: 2rem;">00:26</p>
        </section>
        <section class="bloco" id="bloco-4">
          <div id="grid-sogou" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px;"></div>
        </section>

    <script>
      document.body.style.opacity = 0;

      window.addEventListener('load', () => {
        let opacity = 0;

        const fade = setInterval(() => {
          opacity += 0.01;
          document.body.style.opacity = opacity;
          if (opacity >= 1) clearInterval(fade);
        }, 60);

        setTimeout(revelar, 3000);
        revelar();
      });

      const btn = document.getElementById('playButton');
      const audio = document.getElementById('audio');

      if (btn && audio) {
        btn.addEventListener('click', () => {
          audio.play();
          btn.style.display = 'none';
        });
      }

      const toggle = document.getElementById("menu-toggle");
      const items = document.getElementById("menu-items");

      if (toggle && items) {
        toggle.addEventListener("click", () => {
          items.classList.toggle("active");
        });
      }

      const blocos = document.querySelectorAll('.bloco');

      function revelar() {
        const trigger = window.innerHeight * 0.8;

        blocos.forEach(bloco => {
          const top = bloco.getBoundingClientRect().top;
          if (top < trigger) bloco.classList.add('visivel');
        });
      }

      window.addEventListener('scroll', revelar);

      // ROLAGEM DE IMAGENS
            
        const query = '蝉翼';
        // 1. Monta a URL da API da Sogou com os parâmetros query e mood
        const sogouAPI = `https://pic.sogou.com/napi/pc/searchList?mode=20&start=0&xml_len=48&query=${encodeURIComponent(query)}&mood=2`;
        // 2. Usa o proxy CORS.SH (não precisa de chave)
        const proxyUrl = `https://proxy.cors.sh/${encodeURIComponent(sogouAPI)}`;
      
        fetch(proxyUrl)
          .then(response => response.json())
          .then(data => {
            const grid = document.getElementById('grid-sogou');
            grid.innerHTML = ''; // Limpa o grid
      
            // A estrutura correta dos dados da API oficial
            const items = data?.items || data?.data?.items || [];
      
            if (items.length === 0) {
              grid.innerHTML = '<p>Nenhuma imagem encontrada para esta busca.</p>';
              return;
            }
      
            items.forEach(item => {
              // O campo correto para a URL da imagem é 'picUrl'
              const imgUrl = item.picUrl;
              if (imgUrl && imgUrl.startsWith('http')) {
                const imgElement = document.createElement('img');
                imgElement.src = imgUrl;
                imgElement.alt = item.title || 'Imagem da busca';
                imgElement.loading = 'lazy';
                imgElement.style.cssText = 'width: 100%; height: 200px; object-fit: cover; border-radius: 4px;';
                grid.appendChild(imgElement);
              }
            });
          })
          .catch(error => {
            console.error('Erro ao buscar as imagens:', error);
            const grid = document.getElementById('grid-sogou');
            grid.innerHTML = '<p style="color: red;">Falha ao carregar as imagens. Tente novamente mais tarde.</p>';
          });

        /* const chave = '55284448-c3968ee1416862f04f7195e95';
        const termo = 'cicada';
        const url = `https://pixabay.com/api/?key=${chave}&q=${encodeURIComponent(termo)}&image_type=photo&per_page=100`;
      
        fetch(url)
          .then(r => r.json())
          .then(data => {
            const grid = document.getElementById('grid-imagens');
            data.hits.forEach(img => {
              const el = document.createElement('img');
              el.src = img.webformatURL;
              el.style.cssText = 'width: calc(33% - 4px); object-fit: cover;';
              grid.appendChild(el);
            });
          });*/
      
        </script>
      </script>
</body>
