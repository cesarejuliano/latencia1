      <div class="audio-container">
        <button id="playButton">▶️</button>
        <audio id="audio" src="audios/ninfas.mp3"></audio>
      </div>
      <div class="scroll-layer">

        <section class="bloco delay" id="bloco-1">
          <video autoplay muted loop playsinline>
            <source src="videos/anneteresa.mp4" type="video/mp4">
          </video>
        </section>
        <section class="bloco" id="bloco-2">
          <p style="color: white; font-size: 2rem;">21:15</p>
        </section>
        <section class="bloco" id="bloco-4">
          <iframe 
            src="https://corsproxy.io/?https://pic.sogou.com/pics?query=%E8%9D%89%E7%BF%BC&mood=2&dm=0&mode=1"
            sandbox="allow-scripts allow-same-origin"
            style="width:100%; height:100vh; border:none; display:block;">
          </iframe>
        </section>
    <script>
      document.body.style.opacity = 0;

      window.addEventListener('load', () => {
        let opacity = 0;

        const fade = setInterval(() => {
          opacity += 0.01;
          document.body.style.opacity = opacity;
          if (opacity >= 1) clearInterval(fade);
        }, 60);

        setTimeout(revelar, 3000);
        revelar();
      });

      const btn = document.getElementById('playButton');
      const audio = document.getElementById('audio');

      if (btn && audio) {
        btn.addEventListener('click', () => {
          audio.play();
          btn.style.display = 'none';
        });
      }

      const toggle = document.getElementById("menu-toggle");
      const items = document.getElementById("menu-items");

      if (toggle && items) {
        toggle.addEventListener("click", () => {
          items.classList.toggle("active");
        });
      }

      const blocos = document.querySelectorAll('.bloco');

      function revelar() {
        const trigger = window.innerHeight * 0.8;

        blocos.forEach(bloco => {
          const top = bloco.getBoundingClientRect().top;
          if (top < trigger) bloco.classList.add('visivel');
        });
      }

      window.addEventListener('scroll', revelar);
